name: Dependency Updates

on:
  schedule:
    - cron: '0 2 * * 1'  # Every Monday at 2 AM
  workflow_dispatch:

jobs:
  gradle-update:
    name: Update Gradle Dependencies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Update Gradle Wrapper
        run: ./gradlew wrapper --gradle-version=latest

      - name: Check for dependency updates
        run: ./gradlew dependencyUpdates

      - name: Create Pull Request for Gradle updates
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update Gradle wrapper and dependencies'
          title: 'chore: update Gradle dependencies'
          body: |
            Automated dependency updates for Gradle project.
            
            Please review the changes and test thoroughly before merging.
          branch: chore/gradle-dependency-updates
          delete-branch: true

  npm-update:
    name: Update NPM Dependencies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Update NPM dependencies
        run: |
          cd notebook/frontend
          npx npm-check-updates -u
          npm install

      - name: Run tests after update
        run: |
          cd notebook/frontend
          npm run test
          npm run type-check
          npm run lint

      - name: Create Pull Request for NPM updates
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update NPM dependencies'
          title: 'chore: update frontend dependencies'
          body: |
            Automated dependency updates for frontend (NPM) packages.
            
            Tests have been run to ensure compatibility.
            Please review the changes before merging.
          branch: chore/npm-dependency-updates
          delete-branch: true
