name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: notebook/frontend/package-lock.json

      - name: Cache Gradle packages
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for scripts
        run: |
          chmod +x gradlew
          chmod +x scripts/*.sh

      - name: Install frontend dependencies
        run: |
          cd notebook/frontend
          npm ci

      - name: Build all modules
        run: ./scripts/build-all.sh

      - name: Build LSP distribution
        run: ./gradlew :lsp:installDist

      - name: Create LSP archive
        run: |
          cd lsp/build/install
          tar -czf ../../../dedukt-lsp-${{ github.ref_name }}.tar.gz lsp/

      - name: Build frontend for production
        run: |
          cd notebook/frontend
          npm run build

      - name: Create frontend archive
        run: |
          cd notebook/frontend
          tar -czf ../../dedukt-frontend-${{ github.ref_name }}.tar.gz .next/ public/ package.json

      - name: Generate changelog
        id: changelog
        run: |
          # Simple changelog generation - can be enhanced with conventional commits
          echo "## What's Changed" > CHANGELOG.md
          git log --pretty=format:"* %s (%h)" $(git describe --tags --abbrev=0 HEAD^)..HEAD >> CHANGELOG.md

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: |
            dedukt-lsp-${{ github.ref_name }}.tar.gz
            dedukt-frontend-${{ github.ref_name }}.tar.gz
            **/build/libs/*.jar
          bodyFile: CHANGELOG.md
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}

      - name: Publish to GitHub Packages
        run: |
          ./gradlew publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}